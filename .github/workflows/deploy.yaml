name: CI Pipeline

on:
  push:
    branches:
      - main


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Short SHA
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: manishh07/hubrepo:learn-docker-${{ env.SHA }}

      - name: Checkout Helm Chart Repo
        uses: actions/checkout@v4
        with:
          repository: manishh-07/demo-helm-charts
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: demo-helm-charts

      - name: Update Helm Chart Image Tag
        env:
          IMAGE_TAG: learn-docker-${{ env.SHA }}
        run: |
          cd demo-helm-charts/charts-learndocker
          yq e ".image.repository = \"manishh07/hubrepo\"" -i values.yaml
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i values.yaml

      - name: Commit and Push Helm Chart Change
        run: |
          cd demo-helm-charts/charts-learndocker
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add values.yaml
          git commit -m "chore: update charts-learndocker image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push origin main
